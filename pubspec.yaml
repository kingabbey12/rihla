name: rihla
description: Rihla — a production Flutter travel application.
publish_to: 'none'

# 1.0.0 marketing version for the public launch. Build number 100 stays above
# the closed-beta codes (…+22) so Google Play accepts the upload.
version: 1.0.0+100

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^3.3.2
  flutter_svg: ^2.3.0
  geolocator: ^14.0.3
  go_router: ^17.3.0
  http: ^1.6.0
  intl: any
  maplibre_gl: ^0.26.2
  permission_handler: ^12.0.3
  shared_preferences: ^2.5.5
  connectivity_plus: ^6.1.4
  path_provider: ^2.1.5
  supabase_flutter: ^2.9.1
  flutter_secure_storage: ^10.3.1
  crypto: ^3.0.6
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/illustrations/
    - assets/icons/
