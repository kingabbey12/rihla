# Production stack — isolated network, secrets via env, restart policies, health probes.
# Usage: docker compose -f docker/docker-compose.prod.yml up -d --build
#
# Required env (set in .env.prod or host secrets manager):
#   POSTGRES_PASSWORD, DATABASE_URL, REDIS_URL, SUPABASE_*, ENCRYPTION_KEY, etc.

services:
  postgres:
    image: postgres:16-alpine
    container_name: rihla-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rihla}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-rihla}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - rihla-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rihla} -d ${POSTGRES_DB:-rihla}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: rihla-redis
    restart: always
    command: redis-server --appendonly yes --save 60 1000
    volumes:
      - redis_data:/data
    networks:
      - rihla-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    container_name: rihla-api
    restart: always
    ports:
      - "${API_PORT:-3000}:3000"
    env_file:
      - ../.env.prod
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL required}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rihla-internal
      - rihla-edge
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G

networks:
  rihla-internal:
    driver: bridge
    internal: true
  rihla-edge:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
