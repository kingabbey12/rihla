services:
  postgres:
    image: postgres:16-alpine
    container_name: rihla-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rihla
      POSTGRES_PASSWORD: rihla_secret
      POSTGRES_DB: rihla
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rihla -d rihla"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: rihla-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    container_name: rihla-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://rihla:rihla_secret@postgres:5432/rihla?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    stop_grace_period: 30s

volumes:
  postgres_data:
  redis_data:
